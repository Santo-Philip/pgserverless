# PostgREST Configuration - Nexbic Platform
# https://postgrest.org/en/stable/reference/configuration.html

db-uri = "postgres://$(DB_USER):$(DB_PASSWORD)@pgbouncer:6432/$(DB_NAME)"
db-schema = "public"
db-anon-role = "anon"
db-root-spec = "root"
db-pool = 200
db-pool-timeout = 10
db-extra-search-path = "public"

jwt-secret = "$(JWT_SECRET)"
jwt-aud = "$(JWT_AUD)"

server-port = 3000
server-host = "0.0.0.0"
server-pool-queue = "global"

openapi-mode = "ignore-privileges"
openapi-server-proxy-uri = "http://localhost:$(API_PORT)"
openapi-security-active = true

cors-origin = "*"

max-rows = 1000
