services:

  postgres:
    image: postgres:17-alpine
    container_name: nexbic-postgres
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-api_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ${DB_NAME:-postgres_api}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-api_admin} -d ${DB_NAME:-postgres_api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: nexbic-api
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${SERVER_PORT:-8080}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nexbic-dashboard
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    environment:
      ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:5173}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
      PORT: 5173
    depends_on:
      api:
        condition: service_started

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
