services:

  postgres:
    image: postgres:17-alpine
    container_name: nexbic-postgres
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
      - backup_data:/data/backups
    environment:
      POSTGRES_USER: ${DB_USER:-pgadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nexbic_admin}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pgadmin} -d ${DB_NAME:-nexbic_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: nexbic-dashboard
    restart: unless-stopped
    networks:
      - internal
      - proxy
    ports:
      - "${SERVER_PORT:-2121}:2121"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-pgadmin}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-nexbic_admin}
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      APP_NAME: ${APP_NAME:-Nexbic PG Admin}
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-Nexbic PG Admin}
      PUBLIC_APP_NAME_SHORT: ${PUBLIC_APP_NAME_SHORT:-Nexbic}
      SERVER_PORT: "2121"
      BACKUP_DIR: /data/backups
    volumes:
      - backup_data:/data/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2121/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  internal:
    driver: bridge
  proxy:
    external: true

volumes:
  postgres_data:
  backup_data:
