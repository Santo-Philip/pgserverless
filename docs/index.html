<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexbic Platform — API Documentation</title>
<style>
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --fg: #e2e8f0; --fg2: #94a3b8;
    --accent: #38bdf8; --accent2: #0ea5e9;
    --border: #334155;
    --get: #22d3ee; --post: #4ade80; --patch: #fbbf24; --delete: #f87171;
    --code-bg: #1e293b;
  }
  [data-theme="light"] {
    --bg: #ffffff; --bg2: #f1f5f9; --bg3: #e2e8f0;
    --fg: #0f172a; --fg2: #475569;
    --accent: #0284c7; --accent2: #0369a1;
    --border: #cbd5e1;
    --code-bg: #f1f5f9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.6;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Topbar */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 18px; font-weight: 700; cursor: pointer;
    color: var(--fg); user-select: none;
  }
  .topbar-brand svg { width: 28px; height: 28px; }
  .topbar-nav { display: flex; align-items: center; gap: 6px; }
  .topbar-nav a {
    padding: 6px 14px; border-radius: 6px;
    font-size: 14px; color: var(--fg2); transition: all .15s;
  }
  .topbar-nav a:hover, .topbar-nav a.active {
    background: var(--bg3); color: var(--fg); text-decoration: none;
  }

  .theme-btn {
    background: none; border: 1px solid var(--border); color: var(--fg2);
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all .15s;
  }
  .theme-btn:hover { background: var(--bg3); color: var(--fg); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--accent2); color: #fff;
    padding: 10px 20px; border-radius: 8px; font-size: 14px;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }

  /* Layout */
  .layout { display: flex; max-width: 1400px; margin: 0 auto; }
  .sidebar {
    width: 260px; flex-shrink: 0;
    padding: 24px 16px; position: sticky; top: 56px; height: calc(100vh - 56px);
    overflow-y: auto; border-right: 1px solid var(--border);
  }
  .sidebar h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--fg2); margin: 20px 0 8px 12px;
  }
  .sidebar a {
    display: block; padding: 6px 12px; border-radius: 6px;
    font-size: 14px; color: var(--fg2); transition: all .1s;
  }
  .sidebar a:hover, .sidebar a.active {
    background: var(--bg3); color: var(--fg); text-decoration: none;
  }
  .content { flex: 1; padding: 32px 40px 80px; min-width: 0; }

  h1 { font-size: 32px; margin-bottom: 8px; }
  h2 {
    font-size: 24px; margin: 40px 0 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  h3 { font-size: 18px; margin: 24px 0 12px; }
  p, .desc { color: var(--fg2); margin-bottom: 16px; }

  .endpoint {
    margin: 12px 0; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; transition: border-color .15s;
  }
  .endpoint:hover { border-color: var(--accent); }
  .endpoint-head {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    background: var(--bg2);
  }
  .method {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    min-width: 52px; text-align: center;
  }
  .get { background: var(--get); color: #0c4a6e; }
  .post { background: var(--post); color: #14532d; }
  .patch { background: var(--patch); color: #713f12; }
  .delete { background: var(--delete); color: #7f1d1d; }
  .path { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 14px; word-break: break-all; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: var(--bg3); color: var(--fg2); margin-left: auto;
  }
  .badge.auth { background: #1e3a5f; color: #7dd3fc; }
  .badge.admin { background: #3b1f3b; color: #d8b4fe; }

  .endpoint-body {
    display: none; padding: 16px;
    border-top: 1px solid var(--border);
  }
  .endpoint.open .endpoint-body { display: block; }

  pre {
    background: var(--code-bg); padding: 12px 16px; border-radius: 8px;
    overflow-x: auto; font-size: 13px; margin: 8px 0;
    border: 1px solid var(--border);
  }
  code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
  table {
    width: 100%; border-collapse: collapse; margin: 12px 0;
    font-size: 14px;
  }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-weight: 600; color: var(--fg2); font-size: 12px; text-transform: uppercase; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .content { padding: 24px 16px; }
  }
</style>
</head>
<body>

<div class="topbar">

</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content"></main>
</div>

<div class="toast" id="toast"></div>

        <p>RESTful API for PostgreSQL database administration, authentication, and storage management.</p>
        <p>Base URL: <code>/v1</code></p>
        <p>All resources are organized under <strong>projects</strong>. Each project is a sandboxed environment with its own schemas, tables, roles, monitoring, backups, logs, and storage. Authentication and audit logs are independent of projects.</p>

        <pre>{
  "message": "success",
  "data": { ... }
}</pre>

// ── Render ──
const contentEl = document.getElementById('content');
const sidebarEl = document.getElementById('sidebar');
const brand = document.getElementById('brand');
const toast = document.getElementById('toast');

function render() {
  let sidebarHtml = '';
  DOCS.sections.forEach((sec, i) => {
    sidebarHtml += `<h3>${sec.title}</h3>`;
    if (sec.content) {
      sidebarHtml += `<a href="#${sec.id}" data-section="${i}">Overview</a>`;
    }
    if (sec.endpoints) {
      sec.endpoints.forEach((ep, j) => {
        const label = ep.p.split('/').pop();
        sidebarHtml += `<a href="#${sec.id}-${j}" data-section="${i}" data-endpoint="${j}">${ep.m} ${label}</a>`;
      });
    }
  });
  sidebarEl.innerHTML = sidebarHtml;

  let contentHtml = '';
  DOCS.sections.forEach((sec, si) => {
    if (sec.content) {
      contentHtml += `<section id="${sec.id}">${sec.content}</section>`;
    }
    if (sec.endpoints) {
      sec.endpoints.forEach((ep, ei) => {
        const badge = !ep.auth ? '<span class="badge">Public</span>'
          : ep.auth === 'admin' ? '<span class="badge admin">Admin</span>'
          : '<span class="badge auth">Auth</span>';

        let bodyHtml = '<div class="endpoint-body">';
        bodyHtml += `<p class="desc">${ep.d}</p>`;
        if (ep.body) {
          bodyHtml += '<h4>Request Body</h4><table>';
          for (const [k, v] of Object.entries(ep.body)) {
            bodyHtml += `<tr><td><code>${k}</code></td><td>${v}</td></tr>`;
          }
          bodyHtml += '</table>';
        }
        bodyHtml += '</div>';

        contentHtml += `
          <div class="endpoint" id="${sec.id}-${ei}">
            <div class="endpoint-head" onclick="toggle(this)">
              <span class="method ${ep.m.toLowerCase()}">${ep.m}</span>
              <span class="path">${ep.p}</span>
              ${badge}
            </div>
            ${bodyHtml}
          </div>
        `;
      });
    }
  });
  contentEl.innerHTML = contentHtml;

  // Sidebar scroll tracking
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        sidebarEl.querySelectorAll('a').forEach(a => a.classList.remove('active'));
        const id = entry.target.id;
        sidebarEl.querySelector(`a[href="#${id}"]`)?.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -60% 0px' });
  contentEl.querySelectorAll('[id]').forEach(el => observer.observe(el));
}

function toggle(head) {
  head.parentElement.classList.toggle('open');
}

// ── Theme ──
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  document.getElementById('themeToggle').textContent = t === 'dark' ? '🌙' : '☀️';
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur === 'dark' ? 'light' : 'dark');
});
const saved = localStorage.getItem('theme') || 'dark';
setTheme(saved);

// ── Double-tap login easter egg ──
let tapCount = 0;
let tapTimer = null;
brand.addEventListener('click', () => {
  tapCount++;
  if (tapCount === 2) {
    clearTimeout(tapTimer);
    tapCount = 0;
    window.location.href = '/v1/auth/login';
  } else {
    tapTimer = setTimeout(() => { tapCount = 0; }, 400);
  }
});

// ── Sidebar click scroll ──
sidebarEl.addEventListener('click', (e) => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  const href = a.getAttribute('href');
  if (href && href.startsWith('#')) {
    document.getElementById(href.slice(1))?.scrollIntoView({ behavior: 'smooth' });
  }
});

render();
</script>
