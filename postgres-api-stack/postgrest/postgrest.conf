# PostgREST Configuration
# https://postgrest.org/en/stable/reference/configuration.html

# Database
db-uri = "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
db-schema = "public"
db-anon-role = "anon"
db-root-spec = "root"
db-pool = 10
db-pool-timeout = 10
db-extra-search-path = "public"

# JWT
jwt-secret = "$(JWT_SECRET)"
jwt-aud = "$(JWT_AUD)"

# Server
server-port = 3000
server-host = "0.0.0.0"
server-unix-socket = ""
server-pool-queue = "global"

# OpenAPI
openapi-mode = "ignore-privileges"
openapi-server-proxy-uri = "http://localhost:$(API_PORT)"
openapi-security-active = true

# CORS
cors-origin = "*"

# Proxy
forwarded-by-varnish = false

# Limits
max-rows = 1000
