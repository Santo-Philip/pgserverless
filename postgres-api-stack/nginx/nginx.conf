upstream postgrest {
    server postgrest:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m max_conn=20;

server {
    listen 80;
    server_name _;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # HSTS (uncomment when HTTPS is configured)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/vnd.pgrst.object+json
        application/vnd.pgrst.array+json
        application/openapi+json
        text/plain
        text/css
        application/javascript;

    # Rate limiting
    limit_req zone=api_limit burst=50 nodelay;
    limit_conn api_conn 20;

    # Request size
    client_max_body_size 10m;

    # OpenAPI spec
    location = / {
        proxy_pass http://postgrest/;
    }

    # API
    location / {
        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Accept-Profile, Content-Profile, Prefer" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0 always;
            add_header Content-Type text/plain always;
            return 204;
        }

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Accept-Profile, Content-Profile, Prefer" always;
        add_header Access-Control-Expose-Headers "Content-Range, Range, Preference-Applied" always;

        proxy_pass http://postgrest;
        proxy_intercept_errors on;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to sensitive paths
    location ~* \.(env|conf|sql|md|gitignore)$ {
        deny all;
        return 404;
    }

    # Logging
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;
}
