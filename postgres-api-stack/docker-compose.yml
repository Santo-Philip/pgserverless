services:

  postgres:
    image: postgres:17-alpine
    container_name: pg-api-postgres
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    env_file:
      - .env
    environment:
      TZ: UTC
      PGTZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgrest:
    image: postgrest/postgrest:latest
    container_name: pg-api-postgrest
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./postgrest/postgrest.conf:/etc/postgrest.conf
    env_file:
      - .env
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_ROOT_SPEC: root
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_JWT_AUD: ${JWT_AUD:-postgres-api-stack}
      PGRST_OPENAPI_MODE: ignore-privileges
      PGRST_ADMIN_SERVER_PORT: 3001
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: pg-api-nginx
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - postgrest
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
